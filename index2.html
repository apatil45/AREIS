<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ARQIVE — Architecture Diagrams</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'Segoe UI', sans-serif;
    background: #0B1F3A;
    color: #fff;
    padding: 40px 32px;
    display: flex;
    flex-direction: column;
    gap: 48px;
  }

  .diagram-card {
    background: #132845;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 32px;
  }

  .diagram-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #56B4E9;
    margin-bottom: 6px;
  }
  .diagram-title {
    font-size: 20px;
    font-weight: 500;
    color: #fff;
    margin-bottom: 24px;
  }

  /* SVG color system */
  svg { overflow: visible; }

  /* Gray ramp */
  .c-gray > rect, .c-gray > circle, .c-gray > ellipse { fill: #F1EFE8; stroke: #5F5E5A; }
  .c-gray > text.t, .c-gray > text.th { fill: #444441; }
  .c-gray > text.ts { fill: #5F5E5A; }

  /* Blue ramp */
  .c-blue > rect, .c-blue > circle { fill: #E6F1FB; stroke: #185FA5; }
  .c-blue > text.t, .c-blue > text.th { fill: #0C447C; }
  .c-blue > text.ts { fill: #185FA5; }

  /* Purple ramp */
  .c-purple > rect, .c-purple > circle { fill: #EEEDFE; stroke: #534AB7; }
  .c-purple > text.t, .c-purple > text.th { fill: #3C3489; }
  .c-purple > text.ts { fill: #534AB7; }

  /* Teal ramp */
  .c-teal > rect, .c-teal > circle { fill: #E1F5EE; stroke: #0F6E56; }
  .c-teal > text.t, .c-teal > text.th { fill: #085041; }
  .c-teal > text.ts { fill: #0F6E56; }

  /* Amber ramp */
  .c-amber > rect, .c-amber > circle { fill: #FAEEDA; stroke: #854F0B; }
  .c-amber > text.t, .c-amber > text.th { fill: #633806; }
  .c-amber > text.ts { fill: #854F0B; }

  /* Coral ramp */
  .c-coral > rect, .c-coral > circle { fill: #FAECE7; stroke: #993C1D; }
  .c-coral > text.t, .c-coral > text.th { fill: #712B13; }
  .c-coral > text.ts { fill: #993C1D; }

  /* Text classes */
  text.t  { font-size: 14px; font-weight: 400; fill: #1a1a1a; font-family: -apple-system, 'Segoe UI', sans-serif; }
  text.th { font-size: 14px; font-weight: 500; fill: #1a1a1a; font-family: -apple-system, 'Segoe UI', sans-serif; }
  text.ts { font-size: 12px; font-weight: 400; fill: #555; font-family: -apple-system, 'Segoe UI', sans-serif; }

  /* Leader line */
  .leader { stroke: #aaa; stroke-width: 0.5px; stroke-dasharray: 4 3; fill: none; }

  /* Arrow lines */
  .arr { stroke: #888; stroke-width: 1.5px; fill: none; }

  .watermark {
    font-size: 11px;
    color: rgba(255,255,255,0.25);
    text-align: center;
    margin-top: -24px;
    letter-spacing: 0.06em;
  }
</style>
</head>
<body>

<!-- DIAGRAM 1: SYSTEM ARCHITECTURE -->
<div class="diagram-card">
  <div class="diagram-label">System architecture</div>
  <div class="diagram-title">ARQIVE — Five-layer on-premise stack</div>
  <svg width="100%" viewBox="0 0 680 750" role="img">
    <title>ARQIVE system architecture</title>
    <desc>Five-layer on-premise AI platform — all components run inside the business server boundary.</desc>
    <defs>
      <marker id="a1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </marker>
    </defs>

    <!-- Outer: server boundary -->
    <g class="c-gray">
      <rect x="10" y="10" width="660" height="720" rx="16" stroke-width="0.5" stroke-dasharray="6 3"/>
      <text class="th" x="30" y="36" dominant-baseline="central">Business server boundary</text>
      <text class="ts" x="30" y="54" dominant-baseline="central">All components on company hardware — zero cloud calls, zero external API at runtime</text>
    </g>

    <!-- Layer 5: Presentation -->
    <g class="c-blue">
      <rect x="28" y="72" width="624" height="68" rx="10" stroke-width="0.5"/>
      <text class="th" x="48" y="98" dominant-baseline="central">Layer 5 — Presentation</text>
      <text class="ts" x="48" y="118" dominant-baseline="central">Employee web browser · React SPA · TypeScript · any device, zero install · HTTPS + JWT</text>
    </g>

    <line x1="340" y1="140" x2="340" y2="162" stroke="#378ADD" stroke-width="1.5" marker-end="url(#a1)" fill="none"/>

    <!-- Layer 4: API Gateway -->
    <g class="c-purple">
      <rect x="28" y="164" width="624" height="80" rx="10" stroke-width="0.5"/>
      <text class="th" x="48" y="190" dominant-baseline="central">Layer 4 — API &amp; security gateway</text>
      <text class="ts" x="48" y="210" dominant-baseline="central">Nginx (SSL termination) · FastAPI · JWT auth · RBAC · rate limiting</text>
      <text class="ts" x="48" y="228" dominant-baseline="central">Immutable audit log · SSE streaming · all calls via localhost only</text>
    </g>

    <line x1="340" y1="244" x2="340" y2="266" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#a1)" fill="none"/>

    <!-- Layer 3: Intelligence Engine container -->
    <g class="c-teal">
      <rect x="28" y="268" width="624" height="172" rx="10" stroke-width="0.5"/>
      <text class="th" x="48" y="292" dominant-baseline="central">Layer 3 — Intelligence engine</text>
    </g>

    <!-- 4 inner boxes — x: 44,190,336,482 w:130 -->
    <g class="c-blue">
      <rect x="44" y="306" width="130" height="56" rx="8" stroke-width="0.5"/>
      <text class="th" x="109" y="328" text-anchor="middle" dominant-baseline="central">Semantic search</text>
      <text class="ts" x="109" y="346" text-anchor="middle" dominant-baseline="central">ChromaDB · MiniLM</text>
    </g>
    <g class="c-blue">
      <rect x="190" y="306" width="130" height="56" rx="8" stroke-width="0.5"/>
      <text class="th" x="255" y="328" text-anchor="middle" dominant-baseline="central">Structured query</text>
      <text class="ts" x="255" y="346" text-anchor="middle" dominant-baseline="central">SQLite · PostgreSQL</text>
    </g>
    <g class="c-blue">
      <rect x="336" y="306" width="130" height="56" rx="8" stroke-width="0.5"/>
      <text class="th" x="401" y="328" text-anchor="middle" dominant-baseline="central">RRF re-ranker</text>
      <text class="ts" x="401" y="346" text-anchor="middle" dominant-baseline="central">Merges results, top-5</text>
    </g>
    <g class="c-amber">
      <rect x="482" y="306" width="154" height="56" rx="8" stroke-width="0.5"/>
      <text class="th" x="559" y="328" text-anchor="middle" dominant-baseline="central">Llama 3.2 · Ollama</text>
      <text class="ts" x="559" y="346" text-anchor="middle" dominant-baseline="central">localhost · temp 0.1</text>
    </g>

    <line x1="174" y1="334" x2="188" y2="334" stroke="#378ADD" stroke-width="1.5" marker-end="url(#a1)" fill="none"/>
    <line x1="320" y1="334" x2="334" y2="334" stroke="#378ADD" stroke-width="1.5" marker-end="url(#a1)" fill="none"/>
    <line x1="466" y1="334" x2="480" y2="334" stroke="#378ADD" stroke-width="1.5" marker-end="url(#a1)" fill="none"/>

    <text class="ts" x="340" y="390" text-anchor="middle" dominant-baseline="central">Celery + Redis async task queue · confidence scorer · prompt builder · SSE streamer</text>
    <text class="ts" x="340" y="410" text-anchor="middle" dominant-baseline="central">Prompt sanitiser strips injection patterns · response hash stored to audit log</text>

    <line x1="340" y1="440" x2="340" y2="462" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#a1)" fill="none"/>

    <!-- Layer 2: Ingestion -->
    <g class="c-teal">
      <rect x="28" y="464" width="624" height="80" rx="10" stroke-width="0.5"/>
      <text class="th" x="48" y="490" dominant-baseline="central">Layer 2 — Ingestion pipeline</text>
      <text class="ts" x="48" y="510" dominant-baseline="central">Parser (pdfplumber · python-docx · openpyxl) → Chunker (400 tokens, 60-token overlap)</text>
      <text class="ts" x="48" y="528" dominant-baseline="central">→ Embedder (all-MiniLM-L6-v2 · CPU · offline) → Indexer → ChromaDB + metadata store</text>
    </g>

    <line x1="340" y1="544" x2="340" y2="566" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#a1)" fill="none"/>

    <!-- Layer 1: Storage -->
    <g class="c-gray">
      <rect x="28" y="568" width="624" height="68" rx="10" stroke-width="0.5"/>
      <text class="th" x="48" y="594" dominant-baseline="central">Layer 1 — Document storage</text>
      <text class="ts" x="48" y="614" dominant-baseline="central">Company's own S3 · MinIO · NAS · local filesystem · read-only connector · raw files never copied or stored</text>
    </g>

    <!-- Zero cloud banner -->
    <g class="c-coral">
      <rect x="28" y="652" width="624" height="60" rx="10" stroke-width="0.5"/>
      <text class="th" x="340" y="676" text-anchor="middle" dominant-baseline="central">Zero external API calls at runtime</text>
      <text class="ts" x="340" y="696" text-anchor="middle" dominant-baseline="central">All inference, embeddings, and storage run locally · no cloud billing · no data leaves the server</text>
    </g>

  </svg>
</div>

<!-- DIAGRAM 2: QUERY FLOW -->
<div class="diagram-card">
  <div class="diagram-label">Query pipeline</div>
  <div class="diagram-title">ARQIVE — From question to cited answer</div>
  <svg width="100%" viewBox="0 0 680 650" role="img">
    <title>ARQIVE query flow</title>
    <desc>Six-stage query pipeline from user question to confidence-scored cited answer.</desc>
    <defs>
      <marker id="a2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </marker>
    </defs>

    <!-- Step numbers left rail -->
    <text class="ts" x="28" y="52" text-anchor="middle" dominant-baseline="central">01</text>
    <text class="ts" x="28" y="148" text-anchor="middle" dominant-baseline="central">02</text>
    <text class="ts" x="28" y="244" text-anchor="middle" dominant-baseline="central">03</text>
    <text class="ts" x="28" y="372" text-anchor="middle" dominant-baseline="central">04</text>
    <text class="ts" x="28" y="468" text-anchor="middle" dominant-baseline="central">05</text>
    <text class="ts" x="28" y="564" text-anchor="middle" dominant-baseline="central">06</text>

    <!-- 1: User query -->
    <g class="c-blue">
      <rect x="190" y="26" width="300" height="52" rx="10" stroke-width="0.5"/>
      <text class="th" x="340" y="46" text-anchor="middle" dominant-baseline="central">User query</text>
      <text class="ts" x="340" y="64" text-anchor="middle" dominant-baseline="central">Natural language question in browser</text>
    </g>
    <line x1="340" y1="78" x2="340" y2="118" stroke="#378ADD" stroke-width="1.5" marker-end="url(#a2)" fill="none"/>

    <!-- 2: RBAC gate -->
    <g class="c-purple">
      <rect x="190" y="120" width="300" height="56" rx="10" stroke-width="0.5"/>
      <text class="th" x="340" y="142" text-anchor="middle" dominant-baseline="central">RBAC gate</text>
      <text class="ts" x="340" y="160" text-anchor="middle" dominant-baseline="central">JWT · tenant scope · role · doc ACL checked</text>
    </g>

    <!-- Fork to parallel -->
    <path d="M340 176 L340 198 L170 198 L170 214" fill="none" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#a2)"/>
    <path d="M340 176 L340 198 L510 198 L510 214" fill="none" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#a2)"/>
    <text class="ts" x="340" y="210" text-anchor="middle" dominant-baseline="central">runs in parallel</text>

    <!-- 3a + 3b parallel -->
    <g class="c-teal">
      <rect x="50" y="216" width="240" height="56" rx="10" stroke-width="0.5"/>
      <text class="th" x="170" y="238" text-anchor="middle" dominant-baseline="central">Semantic search</text>
      <text class="ts" x="170" y="256" text-anchor="middle" dominant-baseline="central">MiniLM embed · ChromaDB top-10</text>
    </g>
    <g class="c-teal">
      <rect x="390" y="216" width="240" height="56" rx="10" stroke-width="0.5"/>
      <text class="th" x="510" y="238" text-anchor="middle" dominant-baseline="central">Structured query</text>
      <text class="ts" x="510" y="256" text-anchor="middle" dominant-baseline="central">Date · amount · category filters</text>
    </g>

    <!-- Merge to RRF -->
    <path d="M170 272 L170 320 L290 320 L290 338" fill="none" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#a2)"/>
    <path d="M510 272 L510 320 L390 320 L390 338" fill="none" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#a2)"/>

    <!-- 4: RRF -->
    <g class="c-teal">
      <rect x="190" y="340" width="300" height="56" rx="10" stroke-width="0.5"/>
      <text class="th" x="340" y="362" text-anchor="middle" dominant-baseline="central">RRF re-ranker</text>
      <text class="ts" x="340" y="380" text-anchor="middle" dominant-baseline="central">Fuses both result sets · top-5 chunks</text>
    </g>
    <line x1="340" y1="396" x2="340" y2="436" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#a2)" fill="none"/>

    <!-- 5: Prompt builder -->
    <g class="c-gray">
      <rect x="190" y="438" width="300" height="56" rx="10" stroke-width="0.5"/>
      <text class="th" x="340" y="460" text-anchor="middle" dominant-baseline="central">Prompt builder</text>
      <text class="ts" x="340" y="478" text-anchor="middle" dominant-baseline="central">Sanitised chunks · citation tags · system prompt</text>
    </g>
    <line x1="340" y1="494" x2="340" y2="534" stroke="#888780" stroke-width="1.5" marker-end="url(#a2)" fill="none"/>

    <!-- 6: LLM -->
    <g class="c-amber">
      <rect x="190" y="536" width="300" height="56" rx="10" stroke-width="0.5"/>
      <text class="th" x="340" y="558" text-anchor="middle" dominant-baseline="central">Llama 3.2 · Ollama · localhost</text>
      <text class="ts" x="340" y="576" text-anchor="middle" dominant-baseline="central">temperature 0.1 · SSE streaming · 512 tokens max</text>
    </g>
    <line x1="340" y1="592" x2="340" y2="606" stroke="#BA7517" stroke-width="1.5" marker-end="url(#a2)" fill="none"/>

    <!-- Output -->
    <g class="c-blue">
      <rect x="100" y="608" width="480" height="32" rx="8" stroke-width="0.5"/>
      <text class="th" x="340" y="624" text-anchor="middle" dominant-baseline="central">Cited answer · confidence score (HIGH / MEDIUM / LOW) · doc + page references → browser</text>
    </g>

  </svg>
</div>

<p class="watermark">ARQIVE · On-Premise AI Document Intelligence · Confidential</p>

</body>
</html>
